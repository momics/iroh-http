name: CI

on:
  push:
    branches: [main]
    paths-ignore:
      - 'docs/**'
      - '**.md'
      - '.github/ISSUE_TEMPLATE/**'
      - '.vscode/**'
      - 'CHANGELOG.md'
      - 'CONTRIBUTING.md'
      - 'SECURITY.md'
      - 'LICENSE*'
  pull_request:
    branches: [main]
    paths-ignore:
      - 'docs/**'
      - '**.md'
      - '.github/ISSUE_TEMPLATE/**'
      - '.vscode/**'
      - 'CHANGELOG.md'
      - 'CONTRIBUTING.md'
      - 'SECURITY.md'
      - 'LICENSE*'
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: 0

jobs:
  # ── Format · lint · unit tests · typecheck · audit — one runner ──────────────
  verify:
    name: Verify
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Agent skill regression tests
        run: >-
          python3 -m unittest discover
          -s .agents/skills/analyze-git-diff/scripts
          -p 'test_git_diff_report.py'

      # ── Formatting (fail fast, before any heavy setup) ───────────────────────
      - uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x
      - name: deno fmt --check
        run: deno fmt --check

      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Install Tauri system dependencies
        run: |
          sudo apt-get update -q
          sudo apt-get install -y -q libgtk-3-dev libwebkit2gtk-4.1-dev libayatana-appindicator3-dev librsvg2-dev

      - run: npm ci --omit=optional

      - name: Install Vitest native binding
        # `npm ci --omit=optional` is still required here so prerelease
        # platform packages do not block CI before publish, but Vitest/Vite
        # needs rolldown's native binding at runtime.
        run: npm install --no-save @rolldown/binding-linux-x64-gnu

      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-audit

      # ── Rust ──────────────────────────────────────────────────────────────────
      - name: cargo fmt
        run: cargo fmt --all -- --check

      - name: cargo clippy
        run: |
          cargo clippy --workspace -- \
            -D warnings \
            -D clippy::unwrap_used \
            -D clippy::panic \
            -D clippy::arithmetic_side_effects
          cd packages/iroh-http-tauri && cargo clippy -- \
            -D warnings \
            -D clippy::unwrap_used \
            -D clippy::panic \
            -D clippy::arithmetic_side_effects

      - name: cargo test
        run: cargo test --workspace

      - name: cargo test (iroh-http-tauri)
        # iroh-http-tauri has its own Cargo.lock and is excluded from the
        # workspace; test it explicitly so it is not silently skipped.
        run: cargo test --manifest-path packages/iroh-http-tauri/Cargo.toml

      - name: guest-JS test (iroh-http-tauri)
        run: npm run test:tauri:guest --silent

      - name: release-tooling test (ci-churn guard)
        # Pure-bash regression test for release.sh's fail-closed auto-revert
        # guard (#326). No build/publish side effects, so it stays fast.
        run: |
          npm run test:scripts
          bash scripts/tests/release-version.test.sh

      - name: Release version consistency
        run: |
          VERSION=$(sed -n 's/^version = "\([^"]*\)"/\1/p' Cargo.toml | head -1)
          bash scripts/check-release-version.sh "v$VERSION"

      - name: cargo check (no-default-features)
        run: |
          cargo check -p iroh-http-node --no-default-features
          cargo check -p iroh-http-deno --no-default-features

      # ── TypeScript ────────────────────────────────────────────────────────────
      - name: Build iroh-http-shared
        run: npm run build --workspace=packages/iroh-http-shared

      - name: TypeScript typecheck
        run: |
          npm run typecheck --workspace=packages/iroh-http-shared
          npm run typecheck --workspace=packages/iroh-http-tauri

      - name: Shared discovery lifecycle tests
        run: npm test --workspace=packages/iroh-http-shared

      - name: Example peer-registry tests
        run: npm run test:example

      # Clean example build (#350 F1): the Tauri example uses file: links to the
      # local packages. A clean `tsc` build must resolve PR-only APIs against the
      # freshly-built dist. This step is what catches the example importing
      # exports that don't exist in the packages it depends on.
      - name: Clean example build (examples/tauri)
        run: npm run build:example

      # ── Security audit ────────────────────────────────────────────────────────
      - name: cargo deny (licenses, advisories, bans)
        uses: EmbarkStudios/cargo-deny-action@v2

      - name: cargo audit
        run: cargo audit

      - name: npm audit
        run: npm audit --audit-level=high

  # ── Bench smoke: parallel with e2e so it doesn't extend the critical path ───
  bench-smoke:
    name: Bench smoke test
    runs-on: ubuntu-latest
    needs: verify
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: cargo bench --test (smoke)
        # Criterion's single-iteration mode: validates bench code compiles and
        # doesn't panic at startup — catches runtime/API regressions early.
        # Runs in parallel with the e2e job so it doesn't add to the critical path.
        run: cargo bench -p iroh-http-core -- --test

  # ── Integration: build native + run e2e (only after verify passes) ───────────
  e2e:
    name: End-to-end tests
    runs-on: ubuntu-latest
    needs: verify
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - uses: actions/setup-node@v6
        with:
          node-version: 24
      - uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x

      - run: npm ci --omit=optional

      - name: Build native libs (ci profile)
        run: cargo build --profile ci -p iroh-http-node -p iroh-http-deno

      - name: Build shared TypeScript
        run: npm run build --workspace=packages/iroh-http-shared

      - name: napi generate .node + JS wrapper
        run: |
          cd packages/iroh-http-node
          npx napi build --platform --profile ci
          npx tsc --skipLibCheck

      - name: Node adapter + compliance
        run: |
          node --test packages/iroh-http-node/test/adapter.test.mjs
          node packages/iroh-http-node/test/compliance.mjs

      - name: Copy Deno native lib
        run: |
          mkdir -p packages/iroh-http-deno/lib
          cp target/ci/libiroh_http_deno.so \
             packages/iroh-http-deno/lib/libiroh_http_deno.linux-x86_64.so

      - name: Deno adapter + compliance
        run: |
          deno test --allow-read --allow-ffi --allow-env --allow-net \
            packages/iroh-http-deno/test/adapter.test.ts \
            packages/iroh-http-deno/test/compliance.ts

      - name: Cross-runtime compliance (node↔deno)
        run: bash tests/http-compliance/run.sh

      - name: Interop suite unit tests (suite.mjs accounting)
        run: node --test tests/interop/suite.test.mjs

      - name: Interop suite headless — Node (#340)
        run: node tests/interop/run-node.mjs

      - name: Interop suite headless — Deno (#340)
        run: deno run -A tests/interop/run-deno.ts

  rust-check-macos:
    name: Rust check (macOS)
    if: github.event_name == 'pull_request' || startsWith(github.ref, 'refs/tags/')
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: cargo test (iroh-http-core)
        run: cargo test -p iroh-http-core
      - name: cargo test (iroh-http-discovery)
        run: cargo test -p iroh-http-discovery
      # ── Mobile FFI contract: compile the iOS Swift plugin sources ────────────
      # Build-only (no simulator, no device, no Rust cross-compile). Compiles
      # ios/Sources/IrohHttpPlugin.swift against the matching Tauri iOS API so a
      # renamed/removed `@objc` handler or a signature drift on the native side
      # of the Rust ↔ Swift FFI boundary fails here instead of only on-device.
      # Folded into this existing macOS runner to avoid a second billed
      # macOS job. See issue #333.
      - name: Compile iOS Swift plugin (FFI contract, #333)
        run: bash packages/iroh-http-tauri/scripts/ci-ios-swift-build.sh
      - name: iOS discovery lifecycle contract
        run: bash packages/iroh-http-tauri/ios/ContractTests/run.sh

  # ── Mobile FFI contract: compile the Android Kotlin plugin sources ───────────
  # Ubuntu (no macOS cost), build-only: no emulator, no NDK, no Rust
  # cross-compile. Compiles android/.../IrohHttpPlugin.kt against the matching
  # Tauri Android API so a renamed/removed `@Command` handler or a signature
  # drift fails here instead of only on-device. See issue #333.
  mobile-android:
    name: Android Kotlin plugin compile
    if: github.event_name == 'pull_request' || startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
      - uses: android-actions/setup-android@v3
      - name: Install Android SDK packages
        # compileSdk: 34 (plugin) + 36 (tauri-android); build-tools 35.0.0 is
        # AGP 8.11's default. Kept minimal — Kotlin compile needs no NDK.
        run: |
          sdkmanager "platforms;android-34" "platforms;android-36" "build-tools;35.0.0"
      - uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.14.3'
      - name: Compile Android Kotlin plugin (FFI contract, #333)
        run: bash packages/iroh-http-tauri/scripts/ci-android-gradle-build.sh
      - name: Android discovery lifecycle contract
        run: bash packages/iroh-http-tauri/android-contract-tests/run.sh

  rust-check-windows:
    name: Rust check (Windows)
    if: github.event_name == 'pull_request' || startsWith(github.ref, 'refs/tags/')
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: cargo test (iroh-http-core)
        run: cargo test -p iroh-http-core

  # ── Version-bump policy: only chore: release commits may touch version fields ─
  version-bump-policy:
    name: Version-bump policy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          # Fetch enough history to diff against the base branch / previous push.
          fetch-depth: 0

      - name: Enforce version bumps only in chore-release commits
        shell: bash
        run: |
          # Determine the comparison base: for PRs use the target branch;
          # for pushes to main use the previous commit SHA.
          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            BASE="origin/${{ github.base_ref }}"
          else
            BASE="${{ github.event.before }}"
            # On the very first push the before SHA is all zeros — nothing to diff.
            if [[ "$BASE" == "0000000000000000000000000000000000000000" ]]; then
              echo "Initial push — skipping version-bump policy check."
              exit 0
            fi
          fi

          # Walk every commit in this push / PR range.
          while IFS= read -r sha; do
            CHANGED=$(git diff-tree --no-commit-id -r --name-only "$sha" 2>/dev/null || true)
            # Does this commit touch any version-bearing file?
            if echo "$CHANGED" | grep -qE '(Cargo\.toml|package\.json|deno\.jsonc?)$'; then
              # Narrow to actual version-field changes: a dep bump or script
              # addition is not a version bump and should not be blocked.
              # Match added lines (+) only — never context lines — where the
              # package's OWN version field starts the line content:
              #   Cargo: `version = "X.Y.Z"`   (bare key, no indentation)
              #   JSON : `  "version": "X.Y.Z"` (indented object key)
              # Anchoring the key to the start of the line (after the diff `+`
              # and optional indentation) excludes Cargo dependency-table
              # entries such as `tower-http = { version = "0.7" }`, whose inline
              # `version = "…"` is a dependency requirement, not the package's
              # own version. The trailing [0-9] requires a real version literal.
              # Use specific filenames (not globs) to exclude lock files like
              # package-lock.json and yarn.lock whose "version" entries are
              # dependency versions, not the package's own version.
              # Exclude non-published fixture trees (examples/, tests/, bench/) —
              # their manifests carry their own version field but are never
              # released, so adding a new fixture or benchmark crate is not a
              # version bump.
              VERSION_DIFF=$(git diff-tree --no-commit-id -r -p "$sha" -- \
                'Cargo.toml' '*/Cargo.toml' \
                'package.json' '*/package.json' \
                'deno.json' '*/deno.json' \
                'deno.jsonc' '*/deno.jsonc' \
                ':(exclude)examples/**' ':(exclude)tests/**' ':(exclude)bench/**' 2>/dev/null \
                | grep -E '^\+(version = "|[[:space:]]*"version": ")[0-9]' || true)
              [[ -z "$VERSION_DIFF" ]] && continue

              SUBJECT=$(git log -1 --format=%s "$sha")
              case "$SUBJECT" in
                "chore: release "*|"chore(release): "*)
                  # Allowed — this is a release commit produced by scripts/release.sh.
                  ;;
                *)
                  echo "::error::Commit $sha bumps a version field but is not a 'chore: release' commit."
                  echo "  Subject : $SUBJECT"
                  echo "  Files   : $(echo "$CHANGED" | grep -E '(Cargo\.toml|package\.json|deno\.jsonc?)$' | tr '\n' ' ')"
                  echo "  Fix     : Only scripts/release.sh should bump versions. See CONTRIBUTING.md."
                  exit 1
                  ;;
              esac
            fi
          done < <(git log --format=%H "$BASE"..HEAD)

          echo "Version-bump policy: OK"
