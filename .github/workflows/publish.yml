name: Publish

# Triggered automatically when the Release workflow succeeds, or manually
# when you need to re-publish without rebuilding all 10 native targets.
#
# Manual usage (Actions → Run workflow):
#   run_id: the ID of the successful Release workflow run whose Node artifacts
#           you want to publish. Find it in the URL of the release run page.
#
# All publish steps are idempotent — safe to run multiple times.

on:
  workflow_run:
    workflows: ["Build"]
    types: [completed]
  workflow_dispatch:
    inputs:
      run_id:
        description: 'Build workflow run ID (for Node native artifacts)'
        required: true
        type: string
      target:
        description: 'Which packages to publish'
        required: false
        default: 'all'
        type: choice
        options: [all, npm, crates, jsr]

permissions:
  contents: read
  actions: read    # resolve the head SHA of the Build run + poll extended-tests
  id-token: write   # npm --provenance (Trusted Publishers) + JSR OIDC

jobs:

  # ── 0a. Resolve ref ───────────────────────────────────────────────────────────
  # Determine the EXACT commit whose artifacts we are about to publish, so the
  # source we check out matches the native binaries built from that run. On a
  # manual dispatch `github.sha` is the workflow's own ref (e.g. main@HEAD), NOT
  # the commit behind `run_id` — publishing those together would ship source and
  # binaries from different commits. Resolve the Build run's head SHA via the API
  # and fail closed if that run did not succeed.

  resolve-ref:
    name: Resolve publish ref
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success'
    outputs:
      sha: ${{ steps.resolve.outputs.sha }}
    steps:
      - name: Resolve exact commit SHA to publish
        id: resolve
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            RUN_ID="${{ inputs.run_id }}"
            echo "Resolving head SHA for Build run $RUN_ID"
            RUN_JSON=$(gh api "repos/${{ github.repository }}/actions/runs/$RUN_ID")
            SHA=$(echo "$RUN_JSON" | jq -r '.head_sha')
            CONCLUSION=$(echo "$RUN_JSON" | jq -r '.conclusion')
            if [ "$CONCLUSION" != "success" ]; then
              echo "::error::Build run $RUN_ID did not succeed (conclusion=$CONCLUSION) — refusing to publish"
              exit 1
            fi
          else
            SHA="${{ github.event.workflow_run.head_sha }}"
          fi
          if [ -z "$SHA" ] || [ "$SHA" = "null" ]; then
            echo "::error::Could not resolve a commit SHA to publish"
            exit 1
          fi
          echo "Publishing from commit $SHA"
          echo "sha=$SHA" >> "$GITHUB_OUTPUT"

  # ── 0. Verify ─────────────────────────────────────────────────────────────────
  # Skip automatically if triggered by a failed Release run. The extended-tests
  # gate runs for the resolved SHA in both trigger modes — a manual re-publish
  # must still prove the published commit passed extended tests.

  verify:
    name: Verify before publish
    runs-on: ubuntu-latest
    needs: resolve-ref
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ needs.resolve-ref.outputs.sha }}

      - name: Verify extended tests passed
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          SHA="${{ needs.resolve-ref.outputs.sha }}"
          echo "Checking Extended tests status for $SHA"
          # Poll for up to 30 minutes (extended tests can take a while)
          for i in $(seq 1 60); do
            STATUS=$(gh api \
              "repos/${{ github.repository }}/actions/workflows/extended-tests.yml/runs?head_sha=$SHA&per_page=1" \
              --jq '.workflow_runs[0] | "\(.status) \(.conclusion)"' 2>/dev/null || echo "unknown unknown")
            RUN_STATUS=$(echo "$STATUS" | awk '{print $1}')
            RUN_CONCLUSION=$(echo "$STATUS" | awk '{print $2}')
            if [ "$RUN_STATUS" = "completed" ]; then
              if [ "$RUN_CONCLUSION" = "success" ]; then
                echo "Extended tests passed ✓"
                exit 0
              else
                echo "::error::Extended tests failed ($RUN_CONCLUSION) — blocking publish"
                exit 1
              fi
            fi
            echo "Extended tests still running ($RUN_STATUS), waiting 30s... ($i/60)"
            sleep 30
          done
          echo "::error::Extended tests did not complete within 30 minutes — blocking publish"
          exit 1

      - uses: actions/setup-node@v6
        with:
          node-version: '24'

      - run: npm ci --omit=optional

      - name: Build shared TypeScript
        run: npm run build --workspace=packages/iroh-http-shared

      - name: TypeScript typecheck
        run: |
          npm run typecheck --workspace=packages/iroh-http-shared
          npm run typecheck --workspace=packages/iroh-http-tauri

  # ── 1. Publish Rust crates ────────────────────────────────────────────────────
  # cargo publish already polls for index availability after upload (built-in).
  # No manual wait steps needed between crates.

  publish-crates:
    name: Publish Rust crates
    runs-on: ubuntu-latest
    needs: [resolve-ref, verify]
    if: inputs.target == null || inputs.target == 'all' || inputs.target == 'crates'
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ needs.resolve-ref.outputs.sha }}

      - uses: dtolnay/rust-toolchain@stable

      - name: Publish iroh-http-core
        run: |
          output=$(cargo publish -p iroh-http-core 2>&1) && exit 0
          if echo "$output" | grep -qi 'already uploaded\|already exists'; then
            echo "Already published, skipping"
          else
            echo "$output" >&2
            exit 1
          fi
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

      - name: Publish iroh-http-adapter
        run: |
          output=$(cargo publish -p iroh-http-adapter 2>&1) && exit 0
          if echo "$output" | grep -qi 'already uploaded\|already exists'; then
            echo "Already published, skipping"
          else
            echo "$output" >&2
            exit 1
          fi
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

      - name: Publish iroh-http-discovery
        run: |
          output=$(cargo publish -p iroh-http-discovery 2>&1) && exit 0
          if echo "$output" | grep -qi 'already uploaded\|already exists'; then
            echo "Already published, skipping"
          else
            echo "$output" >&2
            exit 1
          fi
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

      - name: Publish tauri-plugin-iroh-http
        # --no-verify: Tauri depends on system libraries (glib, gtk, webkit)
        # not present on the publish runner. Compilation is already verified
        # by the CI workflow (cargo test/clippy on the full workspace).
        run: |
          output=$(cargo publish --manifest-path packages/iroh-http-tauri/Cargo.toml --no-verify 2>&1) && exit 0
          if echo "$output" | grep -qi 'already uploaded\|already exists'; then
            echo "Already published, skipping"
          else
            echo "$output" >&2
            exit 1
          fi
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

  # ── 2. Publish npm packages ────────────────────────────────────────────────────
  # Uses npm Trusted Publishers (OIDC) — no NPM_TOKEN needed.
  # One-time setup per package: npmjs.com → package Settings → Trusted Publishers
  # → add this workflow (Momics/iroh-http, publish.yml).
  # Packages: iroh-http-shared, iroh-http-node, iroh-http-tauri,
  #           + all 5 iroh-http-node-* platform packages.

  publish-npm:
    name: Publish npm packages
    runs-on: ubuntu-latest
    needs: [resolve-ref, verify]
    if: inputs.target == null || inputs.target == 'all' || inputs.target == 'npm'
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ needs.resolve-ref.outputs.sha }}

      # NOTE: deliberately no `registry-url` here. setup-node's registry-url
      # writes an .npmrc with an empty `_authToken=${NODE_AUTH_TOKEN}`, which
      # suppresses npm's OIDC Trusted Publishing exchange and causes anonymous
      # publishes (E404). Trusted Publishing needs a clean .npmrc + id-token.
      - uses: actions/setup-node@v6
        with:
          node-version: '24'

      - run: npm ci --omit=optional

      - name: Download Node native artifacts
        uses: actions/download-artifact@v8
        with:
          pattern: node-native-*
          path: packages/iroh-http-node/artifacts/
          merge-multiple: true
          run-id: ${{ github.event.workflow_run.id || inputs.run_id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Move artifacts into platform package dirs
        working-directory: packages/iroh-http-node
        run: npx napi artifacts --build-output-dir artifacts/ --npm-dir npm/

      - name: Publish platform packages
        run: |
          for pkg_dir in packages/iroh-http-node/npm/*/; do
            output=$(npm publish "$pkg_dir" --access public --provenance 2>&1) && continue
            if echo "$output" | grep -qi 'previously published\|cannot publish over'; then
              echo "Already published, skipping $pkg_dir"
            else
              echo "$output" >&2
              exit 1
            fi
          done

      - name: Build TypeScript
        run: |
          npm run build --workspace=packages/iroh-http-shared
          (cd packages/iroh-http-node && npx tsc)
          (cd packages/iroh-http-tauri && npx tsc --project tsconfig.json)

      - name: Publish iroh-http-shared
        run: |
          output=$(npm publish --workspace packages/iroh-http-shared --access public --provenance 2>&1) && exit 0
          if echo "$output" | grep -qi 'previously published\|cannot publish over'; then
            echo "Already published, skipping"
          else
            echo "$output" >&2
            exit 1
          fi

      - name: Publish iroh-http-node
        run: |
          output=$(npm publish --workspace packages/iroh-http-node --access public --provenance 2>&1) && exit 0
          if echo "$output" | grep -qi 'previously published\|cannot publish over'; then
            echo "Already published, skipping"
          else
            echo "$output" >&2
            exit 1
          fi

      - name: Publish iroh-http-tauri
        run: |
          output=$(npm publish --workspace packages/iroh-http-tauri --access public --provenance 2>&1) && exit 0
          if echo "$output" | grep -qi 'previously published\|cannot publish over'; then
            echo "Already published, skipping"
          else
            echo "$output" >&2
            exit 1
          fi

  # ── 3. Publish JSR packages ────────────────────────────────────────────────────
  # Uses JSR OIDC — no DENO_AUTH_TOKENS needed.
  # One-time setup: jsr.io → each package → Settings → GitHub Actions publishing
  # → add this workflow (Momics/iroh-http, publish.yml).

  publish-jsr:
    name: Publish JSR packages
    runs-on: ubuntu-latest
    needs: [resolve-ref, verify]
    if: inputs.target == null || inputs.target == 'all' || inputs.target == 'jsr'
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ needs.resolve-ref.outputs.sha }}

      - uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x

      - name: Publish iroh-http-shared to JSR
        working-directory: packages/iroh-http-shared
        run: |
          output=$(deno publish 2>&1) && exit 0
          if echo "$output" | grep -qi 'already exists\|already published'; then
            echo "Already published, skipping"
          else
            echo "$output" >&2
            exit 1
          fi

      # Populate src/checksums.ts from the exact native binaries built by this
      # run, so published consumers verify the downloaded library's SHA-256
      # before Deno.dlopen(). Without this the integrity map ships empty and
      # downloads are refused (fail-closed) at runtime.
      - name: Download Deno native artifacts
        uses: actions/download-artifact@v8
        with:
          pattern: deno-native-*
          path: packages/iroh-http-deno/lib/
          merge-multiple: true
          run-id: ${{ github.event.workflow_run.id || inputs.run_id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate native checksums
        working-directory: packages/iroh-http-deno
        run: deno run --allow-read --allow-write=src/checksums.ts scripts/gen-checksums.mts lib

      - name: Publish iroh-http-deno to JSR
        working-directory: packages/iroh-http-deno
        run: |
          # --allow-dirty: src/checksums.ts was just regenerated from the
          # release artifacts and is intentionally not committed.
          output=$(deno publish --allow-dirty 2>&1) && exit 0
          if echo "$output" | grep -qi 'already exists\|already published'; then
            echo "Already published, skipping"
          else
            echo "$output" >&2
            exit 1
          fi
