name: Extended tests

on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: extended-tests-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: 0

jobs:
  test-node:
    name: "Node.js"
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - uses: actions/setup-node@v6
        with:
          node-version: 24

      - run: npm ci --omit=optional

      - name: Build native libs
        run: cargo build --profile ci -p iroh-http-node

      - name: Build shared TypeScript
        run: npm run build --workspace=packages/iroh-http-shared

      - name: Build Node binding
        run: |
          cd packages/iroh-http-node
          npx napi build --platform --profile ci
          npx tsc --skipLibCheck

      - name: Run tests
        run: node --test --test-force-exit tests/runners/node.mjs

  test-deno:
    name: "Deno"
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x

      - name: Build native libs
        run: cargo build --profile ci -p iroh-http-deno

      - name: Copy Deno native lib
        run: |
          mkdir -p packages/iroh-http-deno/lib
          cp target/ci/libiroh_http_deno.so \
             packages/iroh-http-deno/lib/libiroh_http_deno.linux-x86_64.so

      - name: Run tests
        run: deno test -A tests/runners/deno.ts

  test-tauri:
    name: "Tauri (webview)"
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: tests/tauri-app/src-tauri
      - uses: actions/setup-node@v6
        with:
          node-version: 24

      # System dependencies for building a Tauri app and driving it via
      # tauri-driver: webkit2gtk-driver provides WebKitWebDriver, xvfb provides
      # a virtual display so the webview can run headless.
      - name: Install Tauri + WebDriver system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libxdo-dev \
            webkit2gtk-driver \
            xvfb

      - name: Install tauri-driver
        run: cargo install tauri-driver --locked

      - name: Install test-app dependencies
        working-directory: tests/tauri-app
        run: npm install

      # Builds the Tauri app (via the wdio onPrepare hook) and runs every shared
      # compliance suite inside a real WebKit webview. Fails the job if any
      # compliance test fails.
      - name: Run compliance suites (WebDriver)
        working-directory: tests/tauri-app
        run: xvfb-run --auto-servernum npm run test:e2e
