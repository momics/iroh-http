name: Build

# Triggered on version tags. Responsibilities:
#   1. Create a draft GitHub release from the reviewed CHANGELOG section.
#   2. Build all native binaries (Node + Deno) across 5 platforms.
#
# Publishing is handled separately by publish.yml, which is promoted manually
# (Actions → Run workflow → Publish) against a release tag once its Build and
# Extended tests are green. It never triggers automatically.

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write   # create GitHub release + upload release assets

jobs:

  # ── 1. Create GitHub release ──────────────────────────────────────────────────

  create-release:
    name: Create GitHub release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v6
        with:
          node-version: '24'

      - name: Verify tag matches every package version
        env:
          TAG: ${{ github.ref_name }}
        run: bash scripts/check-release-version.sh "$TAG"

      - name: Extract curated release notes
        run: bash scripts/extract-release-notes.sh "${{ github.ref_name }}" > RELEASE_NOTES.md

      - uses: softprops/action-gh-release@v3
        with:
          body_path: RELEASE_NOTES.md
          # A tag starts Build and Extended tests concurrently. Keep the
          # release private until both workflows pass, the exact artifacts are
          # promoted to the registries, and a maintainer publishes the draft.
          draft: true

  # ── 2. Build Node native binaries (5 targets) ─────────────────────────────────

  build-node:
    name: Build Node native (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    needs: create-release
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            cross: true
          - os: macos-latest
            target: x86_64-apple-darwin
            cross: true
          - os: macos-latest
            target: aarch64-apple-darwin
          - os: windows-latest
            target: x86_64-pc-windows-msvc
    steps:
      - uses: actions/checkout@v6

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2

      - uses: actions/setup-node@v6
        with:
          node-version: '24'

      - run: npm ci --omit=optional

      - name: Install cross-compile tools (aarch64 Linux)
        if: matrix.cross && runner.os == 'Linux'
        env:
          DEBIAN_FRONTEND: noninteractive
        run: |
          sudo apt-get update -q
          sudo apt-get install -y -q gcc-aarch64-linux-gnu g++-aarch64-linux-gnu

      - name: Build native addon
        working-directory: packages/iroh-http-node
        run: npx napi build --platform --release --target ${{ matrix.target }}
        env:
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: ${{ matrix.cross && runner.os == 'Linux' && 'aarch64-linux-gnu-gcc' || '' }}

      - name: Smoke test (host-native targets only)
        if: ${{ !matrix.cross }}
        working-directory: packages/iroh-http-node
        run: node -e "require('./index.js'); console.log('loaded ok')"

      - uses: actions/upload-artifact@v7
        with:
          name: node-native-${{ matrix.target }}
          path: packages/iroh-http-node/iroh-http-node.*.node
          if-no-files-found: error

  # ── 3. Build Deno native binaries (5 targets) ─────────────────────────────────

  build-deno:
    name: Build Deno native (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    needs: create-release
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            asset: libiroh_http_deno.linux-x86_64.so
            lib: libiroh_http_deno.so
          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            asset: libiroh_http_deno.linux-aarch64.so
            lib: libiroh_http_deno.so
            cross: true
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            asset: libiroh_http_deno.windows-x86_64.dll
            lib: iroh_http_deno.dll
          - os: macos-latest
            target: aarch64-apple-darwin
            asset: libiroh_http_deno.darwin-aarch64.dylib
            lib: libiroh_http_deno.dylib
          - os: macos-latest
            target: x86_64-apple-darwin
            asset: libiroh_http_deno.darwin-x86_64.dylib
            lib: libiroh_http_deno.dylib
    steps:
      - uses: actions/checkout@v6

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2

      - name: Install cross-compile tools (aarch64 Linux)
        if: matrix.cross && runner.os == 'Linux'
        env:
          DEBIAN_FRONTEND: noninteractive
        run: |
          sudo apt-get update -q
          sudo apt-get install -y -q gcc-aarch64-linux-gnu g++-aarch64-linux-gnu

      - name: Build
        run: cargo build --release -p iroh-http-deno --target ${{ matrix.target }}
        env:
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: ${{ matrix.cross && runner.os == 'Linux' && 'aarch64-linux-gnu-gcc' || '' }}

      - name: Rename to release asset name
        shell: bash
        run: cp target/${{ matrix.target }}/release/${{ matrix.lib }} ${{ matrix.asset }}

      - name: Upload to GitHub release
        run: gh release upload ${{ github.ref_name }} ${{ matrix.asset }} --clobber
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/upload-artifact@v7
        with:
          name: deno-native-${{ matrix.target }}
          path: ${{ matrix.asset }}
          if-no-files-found: error
