name: Benchmarks

# Runs benchmarks for Rust (Criterion), Node.js (mitata), and Deno.
# Raw normalized results are archived as workflow artifacts and committed to the
# long-lived `bench-results` branch (one folder per tag) for durable tracking.
# No dashboard, no regression gating — benchmarks are recorded, not enforced.
# Any visualisation can be regenerated on demand from the committed JSON.
#
# Triggers:
#   - push to tags (v*.*.*): per-release snapshot → bench-results/data/<tag>
#   - workflow_dispatch (no input): manual snapshot → bench-results/data/main-<sha>
#   - workflow_dispatch (tag=vX.Y.Z): re-benchmark an existing release using THAT
#       tag's own harness + library source, then overwrite bench-results/data/<tag>.
#       Run it from the default branch so the current (fixed) archival step is used.

on:
  push:
    tags:
      - 'v*.*.*'
    paths-ignore:
      - 'docs/**'
      - '**.md'
      - '.github/ISSUE_TEMPLATE/**'
      - '.github/skills/**'
      - '.vscode/**'
      - 'CHANGELOG.md'
      - 'LICENSE*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Existing tag to re-benchmark (e.g. v0.5.2). Blank = main snapshot.'
        required: false
        default: ''

concurrency:
  group: bench-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  # Pinned so the benchmark baseline stays comparable across releases. A floating
  # `v2.x` silently changed the native loopback baseline between runs (delayed-ACK
  # stall) and looked like a regression in our numbers. Bump deliberately.
  DENO_VERSION: '2.8.3'

jobs:
  bench-node:
    name: Node benchmarks
    runs-on: ${{ vars.BENCHMARK_RUNNER != '' && vars.BENCHMARK_RUNNER || 'ubuntu-latest' }}
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ inputs.tag || github.ref }}
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - uses: actions/setup-node@v6
        with:
          node-version: 24
      - run: npm ci --omit=optional
      - name: Build shared + node adapter
        run: |
          npm run build --workspace=packages/iroh-http-shared
          cargo build --release -p iroh-http-node
          cd packages/iroh-http-node
          npx napi build --platform --release
          npx tsc --skipLibCheck
      - name: Run mitata suites
        run: node bench/node/bench.mjs
      - name: Emit normalized Node benchmark JSON
        run: |
          mkdir -p bench/results
          node bench/node/report.mjs --json throughput > bench/results/node-throughput.json
          node bench/node/report.mjs --json latency > bench/results/node-latency.json
      - uses: actions/upload-artifact@v7
        with:
          name: node-bench-results
          path: bench/results/node-*.json
          retention-days: 90

  bench-deno:
    name: Deno benchmarks
    runs-on: ${{ vars.BENCHMARK_RUNNER != '' && vars.BENCHMARK_RUNNER || 'ubuntu-latest' }}
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ inputs.tag || github.ref }}
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - uses: denoland/setup-deno@v2
        with:
          deno-version: ${{ env.DENO_VERSION }}
      - name: Build deno native adapter
        run: |
          cargo build --release -p iroh-http-deno
          mkdir -p packages/iroh-http-deno/lib
          case "${{ runner.os }}" in
            Linux)
              cp target/release/libiroh_http_deno.so packages/iroh-http-deno/lib/libiroh_http_deno.linux-x86_64.so
              ;;
            macOS)
              cp target/release/libiroh_http_deno.dylib packages/iroh-http-deno/lib/libiroh_http_deno.darwin-x86_64.dylib
              ;;
            Windows)
              cp target/release/iroh_http_deno.dll packages/iroh-http-deno/lib/libiroh_http_deno.windows-x86_64.dll
              ;;
          esac
      - name: Run Deno bench suites
        run: deno bench --allow-net --allow-ffi --allow-env --allow-read --allow-write --allow-sys bench/deno/bench.ts
      - name: Emit normalized Deno benchmark JSON
        run: |
          mkdir -p bench/results
          deno run --allow-net --allow-ffi --allow-env --allow-read --allow-write --allow-sys bench/deno/report.ts --json throughput > bench/results/deno-throughput.json
          deno run --allow-net --allow-ffi --allow-env --allow-read --allow-write --allow-sys bench/deno/report.ts --json latency > bench/results/deno-latency.json
      - uses: actions/upload-artifact@v7
        with:
          name: deno-bench-results
          path: bench/results/deno-*.json
          retention-days: 90

  bench-rust:
    name: Rust Criterion benchmarks
    runs-on: ${{ vars.BENCHMARK_RUNNER != '' && vars.BENCHMARK_RUNNER || 'ubuntu-latest' }}
    timeout-minutes: 30
    outputs:
      sha: ${{ steps.benchsha.outputs.sha }}
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ inputs.tag || github.ref }}
      - id: benchsha
        run: echo "sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - uses: actions/setup-node@v6
        with:
          node-version: 24
      - name: Run Criterion benches
        run: |
          cargo bench -p iroh-http-core --bench throughput
          cargo bench -p iroh-http-core --bench latency
      - name: Normalize Criterion output
        run: |
          mkdir -p bench/results
          node bench/scripts/normalize-criterion-json.mjs target/criterion bench/results/rust-throughput.json bench/results/rust-latency.json
      - uses: actions/upload-artifact@v7
        with:
          name: rust-bench-results
          path: bench/results/rust-*.json
          retention-days: 90

  store:
    name: Archive results to bench-results branch
    needs: [bench-node, bench-deno, bench-rust]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all benchmark artifacts
        uses: actions/download-artifact@v7
        with:
          path: incoming
          merge-multiple: true
      - name: Commit raw results to bench-results branch
        env:
          # A dispatched `tag` input wins; otherwise fall back to the pushed tag,
          # or a main-<sha> snapshot for a plain manual run.
          SNAPSHOT: ${{ inputs.tag != '' && inputs.tag || (github.ref_type == 'tag' && github.ref_name || format('main-{0}', github.sha)) }}
          # The commit actually benchmarked (the checked-out tag when re-benching),
          # not the workflow's own github.sha which is the default branch.
          COMMIT: ${{ needs.bench-rust.outputs.sha }}
          REF: ${{ inputs.tag != '' && format('refs/tags/{0}', inputs.tag) || github.ref }}
        run: |
          set -euo pipefail
          repo="https://x-access-token:${{ github.token }}@github.com/${{ github.repository }}.git"
          git clone --depth 1 "$repo" repo
          cd repo
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if git ls-remote --exit-code --heads origin bench-results >/dev/null 2>&1; then
            git fetch --depth 1 origin bench-results
            # `git fetch` only updates FETCH_HEAD; the shallow clone of the
            # default branch has no local `bench-results` ref to check out.
            # Create/reset the branch from the fetched commit explicitly.
            git checkout -B bench-results FETCH_HEAD
          else
            git checkout --orphan bench-results
            git rm -rf . >/dev/null 2>&1 || true
          fi
          dest="data/$SNAPSHOT"
          mkdir -p "$dest"
          cp ../incoming/*.json "$dest/"
          cat > "$dest/meta.json" <<EOF
          {
            "snapshot": "$SNAPSHOT",
            "commit": "$COMMIT",
            "ref": "$REF",
            "recorded_at": "$(date -u +%Y-%m-%dT%H:%M:%SZ)",
            "deno_version": "${{ env.DENO_VERSION }}",
            "runner_os": "${{ runner.os }}"
          }
          EOF
          git add data
          git commit -m "bench: record results for $SNAPSHOT" || { echo "No changes to record"; exit 0; }
          git push origin bench-results
