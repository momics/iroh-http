"$schema" = "../schemas/schema.json"

[[set]]
identifier = "dns-sd"
description = "Enables generic DNS-SD service discovery — advertise and browse arbitrary local services with full control over instance name, port, TXT records, and protocol."
permissions = [
  "allow-dns-sd-advertise",
  "allow-dns-sd-advertise-close",
  "allow-dns-sd-browse",
  "allow-dns-sd-next-record",
  "allow-dns-sd-browse-close",
]
