"$schema" = "../schemas/schema.json"

[[set]]
identifier = "fetch"
description = "Enables node.fetch() — send HTTP requests to remote peers. Includes all internal body-streaming primitives required for fetch to function."
permissions = [
  "allow-fetch",
  "allow-create-fetch-token",
  "allow-cancel-in-flight",
  "allow-cancel-request",
  "allow-create-body-writer",
  "allow-next-chunk",
  "allow-try-next-chunk",
  "allow-send-chunk",
  "allow-finish-body",
]
