"$schema" = "../schemas/schema.json"

[[set]]
identifier = "mdns"
description = "Enables local peer discovery via mDNS — browse for peers on the local network and advertise this node."
permissions = [
  "allow-mdns-browse",
  "allow-mdns-browse-close",
  "allow-mdns-next-event",
  "allow-mdns-advertise",
  "allow-mdns-advertise-close",
]
