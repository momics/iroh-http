"$schema" = "../schemas/schema.json"

[[set]]
identifier = "serve"
description = "Enables node.serve() — accept incoming HTTP requests from remote peers. Includes all internal body-streaming primitives required for handlers to read and write bodies."
permissions = [
  "allow-serve",
  "allow-stop-serve",
  "allow-wait-serve-stop",
  "allow-respond-to-request",
  "allow-next-chunk",
  "allow-try-next-chunk",
  "allow-send-chunk",
  "allow-finish-body",
  "allow-create-body-writer",
  "allow-cancel-request",
]
