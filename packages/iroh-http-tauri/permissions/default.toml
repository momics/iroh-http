"$schema" = "../schemas/schema.json"

[default]
description = "Node lifecycle and introspection. Covers createNode() and close(). Add iroh-http:fetch and/or iroh-http:serve for HTTP capability."
permissions = [
  "allow-create-endpoint",
  "allow-close-endpoint",
  "allow-wait-endpoint-closed",
  "allow-ping",
  "allow-node-addr",
  "allow-node-ticket",
  "allow-home-relay",
  "allow-peer-info",
  "allow-peer-stats",
  "allow-endpoint-stats",
  "allow-start-transport-events",
]
