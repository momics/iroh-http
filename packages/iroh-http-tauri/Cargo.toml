[package]
name = "tauri-plugin-iroh-http"
version = "0.5.0"
edition = "2021"
rust-version = "1.77.2"
description = "Tauri plugin for iroh-http peer-to-peer HTTP"
license = "MIT OR Apache-2.0"
repository = "https://github.com/Momics/iroh-http"
readme = "README.md"
links = "tauri-plugin-iroh-http"

[workspace]

# staticlib = iOS, cdylib = Android, rlib = desktop / tests
[lib]
crate-type = ["staticlib", "cdylib", "rlib"]

[features]
default = ["discovery"]
discovery = ["iroh-http-discovery/mdns"]

[dependencies]
iroh-http-core = { path = "../../crates/iroh-http-core", version = "0.5.0" }
iroh-http-adapter = { path = "../../crates/iroh-http-adapter", version = "0.5.0" }
slab = "0.4"
bytes = "1"
base64 = "0.22"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
tauri = { version = "2", features = [] }
tokio = { version = "1", features = ["rt", "sync"] }
tracing = "0.1"

# Desktop only: mDNS via Rust mdns-sd. On mobile (iOS/Android) mDNS is handled
# by the native platform layer (NWBrowser / NsdManager) via the mobile bridge.
[target.'cfg(not(any(target_os = "android", target_os = "ios")))'.dependencies]
iroh-http-discovery = { path = "../../crates/iroh-http-discovery", version = "0.5.0", optional = true }

[dev-dependencies]
tauri = { version = "2", features = ["test"] }
tokio = { version = "1", features = ["rt-multi-thread", "macros"] }
base32 = "0.5"

[build-dependencies]
tauri-plugin = { version = "2", features = ["build"] }
