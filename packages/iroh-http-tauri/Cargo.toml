[package]
name = "tauri-plugin-iroh-http"
version = "0.6.0"
edition = "2021"
rust-version = "1.77.2"
description = "Tauri plugin for iroh-http peer-to-peer HTTP"
license = "MIT OR Apache-2.0"
repository = "https://github.com/momics/iroh-http"
readme = "README.md"
links = "tauri-plugin-iroh-http"

[workspace]

# This crate is its own standalone workspace (not a member of the repo-root
# workspace). Pin `iroh` here so `[dependencies]` can inherit it with
# `workspace = true` — the same `"1.0"` requirement the repo root pins — keeping
# this crate's iroh locked to the same version as iroh-http-core / -adapter.
[workspace.dependencies]
iroh = "1.0"

# staticlib = iOS, cdylib = Android, rlib = desktop / tests
[lib]
crate-type = ["staticlib", "cdylib", "rlib"]

[features]
default = ["discovery"]
discovery = ["iroh-http-discovery/mdns"]

[dependencies]
iroh-http-core = { path = "../../crates/iroh-http-core", version = "0.6.0" }
iroh-http-adapter = { path = "../../crates/iroh-http-adapter", version = "0.6.0" }
# iroh: the mobile AddressLookup bridge implements
# `iroh::address_lookup::AddressLookup` in-process. Inherited from
# `[workspace.dependencies]` above so it stays locked to the same iroh as
# iroh-http-core / -adapter. n0-future supplies the `BoxStream` /
# `stream::once` used by `resolve()`; pinned to the version iroh 1.0.x uses.
iroh = { workspace = true }
n0-future = "0.3"
slab = "0.4"
bytes = "1"
base64 = "0.22"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
tauri = { version = "2", features = [] }
tokio = { version = "1", features = ["rt", "sync"] }
tracing = "0.1"
# iroh enables reqwest's `rustls-no-provider` feature, which strips reqwest of a
# built-in crypto backend and makes it rely on a process-wide default rustls
# CryptoProvider. Tauri's asset / dev-server proxy also builds a reqwest client,
# so the plugin installs the ring provider (the same backend iroh uses) at
# startup to stop the first `tauri://` request from aborting. Pinned to the
# version already in the tree so no second copy is linked.
rustls = { version = "0.23", default-features = false, features = ["ring"] }

# Desktop only: mDNS via Rust mdns-sd. On mobile (iOS/Android) mDNS is handled
# by the native platform layer (NWBrowser / NsdManager) via the mobile bridge.
[target.'cfg(not(any(target_os = "android", target_os = "ios")))'.dependencies]
iroh-http-discovery = { path = "../../crates/iroh-http-discovery", version = "0.6.0", optional = true }

[dev-dependencies]
tauri = { version = "2", features = ["test"] }
tokio = { version = "1", features = ["rt-multi-thread", "macros"] }
base32 = "0.5"
toml = "0.8"

[build-dependencies]
tauri-plugin = { version = "2", features = ["build"] }
