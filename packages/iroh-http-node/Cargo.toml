[package]
name = "iroh-http-node"
version.workspace = true
edition.workspace = true
description = "Node.js native addon for iroh-http (napi-rs)"
license.workspace = true
repository.workspace = true

[lib]
crate-type = ["cdylib"]

[features]
default = ["discovery"]
discovery = ["iroh-http-discovery/mdns", "iroh"]

[dependencies]
iroh-http-core = { path = "../../crates/iroh-http-core", version = "0.6.0" }
iroh-http-adapter = { path = "../../crates/iroh-http-adapter", version = "0.6.0" }
iroh-http-discovery = { path = "../../crates/iroh-http-discovery", version = "0.6.0", optional = true }
iroh = { workspace = true, optional = true }
napi = { version = "3", features = ["async", "napi9"] }
napi-derive = "3"
tokio = { workspace = true, features = ["rt-multi-thread"] }
bytes = { workspace = true }
tracing = "0.1"
serde_json = "1"
dashmap = "6"

[build-dependencies]
napi-build = "2"
