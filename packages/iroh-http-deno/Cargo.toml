[package]
name = "iroh-http-deno"
version.workspace = true
edition.workspace = true
description = "Deno FFI native library for iroh-http"
license.workspace = true
repository.workspace = true

[lib]
name = "iroh_http_deno"
crate-type = ["cdylib"]

[features]
default = ["discovery"]
discovery = ["iroh-http-discovery/mdns"]

[dependencies]
iroh-http-core = { path = "../../crates/iroh-http-core", version = "0.5.0" }
iroh-http-adapter = { path = "../../crates/iroh-http-adapter", version = "0.5.0" }
iroh-http-discovery = { path = "../../crates/iroh-http-discovery", version = "0.5.0", optional = true }
tokio = { workspace = true, features = ["rt-multi-thread"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
bytes = { workspace = true }
base64 = "0.22"
slab = { workspace = true }
tracing = "0.1"
dashmap = "6"
