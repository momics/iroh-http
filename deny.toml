[advisories]
# "none" skips the unmaintained check; several transitive deps from iroh and
# Tauri are flagged as unmaintained but are not directly upgradeable by us.
unmaintained = "none"
yanked = "deny"
ignore = [
    # quick-xml via plist -> netdev -> netwatch -> iroh.
    # No patched plist release exists yet; remove once plist can use quick-xml >= 0.41.
    "RUSTSEC-2026-0194",
    # quick-xml via plist -> netdev -> netwatch -> iroh.
    # No patched plist release exists yet; remove once plist can use quick-xml >= 0.41.
    "RUSTSEC-2026-0195",
]

[bans]
# Warn on duplicate versions to keep the dependency tree auditable.
multiple-versions = "warn"
# Note: wildcards = "deny" is intentionally omitted. cargo-deny flags
# workspace-internal path dependencies (which cannot carry a version field)
# as wildcards, producing false positives for every monorepo crate.

# ── Known iroh-internal duplicate suppressions ────────────────────────────────
#
# All entries below are caused by two splits inside iroh's own transitive graph
# that we cannot resolve:
#
#   Split 1 — reqwest 0.12 vs 0.13:
#     iroh v0.96.1 uses reqwest v0.12 directly.
#     iroh v0.96.1 → pkarr v5.0.4 → reqwest v0.13 (pkarr migrated; iroh hasn't).
#     reqwest v0.13 pulls in rustls-platform-verifier → jni v0.21.1 which still
#     depends on windows-sys v0.45 / windows-targets v0.42. jni v0.22 fixes this
#     but rustls-platform-verifier hasn't bumped yet.
#
#   Split 2 — ring → windows-sys v0.52:
#     iroh-quinn-proto → ring v0.17 → windows-sys v0.52 / windows-targets v0.52.
#
#   Split 3 — netdev → windows-sys v0.59/v0.61:
#     iroh → netdev v0.40 → windows-sys v0.59/v0.61.
#
# When any of these upstream crates align their windows-sys dependency the
# skip entries below can be removed.

# windows-sys — three generations pulled by jni (0.45), ring (0.52), netdev (0.59/0.61)
[[bans.skip]]
name = "windows-sys"
reason = "jni@0.21→0.45, ring→0.52, netdev→0.59/0.61 — all iroh transitive; unfixable by us"

[[bans.skip]]
name = "windows-targets"
reason = "follows windows-sys split: 0.42 via jni, 0.52 via ring"

[[bans.skip]]
name = "windows_i686_gnu"
reason = "windows-targets 0.42/0.52 split — iroh transitive"

[[bans.skip]]
name = "windows_i686_msvc"
reason = "windows-targets 0.42/0.52 split — iroh transitive"

[[bans.skip]]
name = "windows_x86_64_gnu"
reason = "windows-targets 0.42/0.52 split — iroh transitive"

[[bans.skip]]
name = "windows_x86_64_gnullvm"
reason = "windows-targets 0.42/0.52 split — iroh transitive"

[[bans.skip]]
name = "windows_x86_64_msvc"
reason = "windows-targets 0.42/0.52 split — iroh transitive"

[[bans.skip]]
name = "windows_aarch64_gnullvm"
reason = "windows-targets 0.42/0.52 split — iroh transitive"

[[bans.skip]]
name = "windows_aarch64_msvc"
reason = "windows-targets 0.42/0.52 split — iroh transitive"

# Other iroh-transitive duplicates
[[bans.skip]]
name = "thiserror"
reason = "thiserror 1.x and 2.x coexist across iroh's dep tree — upstream migration in progress"

[[bans.skip]]
name = "thiserror-impl"
reason = "proc-macro companion to thiserror 1.x/2.x split"

[[bans.skip]]
name = "hashbrown"
reason = "multiple versions (0.14/0.16/0.17) pulled by different iroh transitive deps"

[[bans.skip]]
name = "getrandom"
reason = "0.2/0.3/0.4 coexist across iroh + ring + rand transitive deps"

[[bans.skip]]
name = "cpufeatures"
reason = "0.2/0.3 coexist across ring and other crypto libs in iroh"

[[bans.skip]]
name = "convert_case"
reason = "0.6/0.10 split across iroh transitive deps (proc-macro crates)"

[[bans.skip]]
name = "r-efi"
reason = "5.x/6.x split across iroh transitive deps"

[[bans.skip]]
name = "netlink-packet-route"
reason = "0.28/0.29 split across iroh transitive deps"

[licenses]
allow = [
  "Apache-2.0",
  # Used by target-lexicon and other LLVM/Cranelift-adjacent crates pulled in
  # by Tauri and wasm toolchains. Functionally identical to Apache-2.0 for
  # our purposes.
  "Apache-2.0 WITH LLVM-exception",
  "MIT",
  "BSD-2-Clause",
  "BSD-3-Clause",
  "CDLA-Permissive-2.0",
  "ISC",
  "MPL-2.0",
  "Unlicense",
  "Unicode-3.0",
  "Zlib",
]
confidence-threshold = 0.8
